<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume Bot - RAIN & GEMS-VIP Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        h1 { font-size: 2rem; }
        .emoji { font-size: 2.5rem; margin-right: 10px; }
        .token-selector { text-align: center; margin: 40px 0; }
        .buttons { display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        button {
            background: #5b21b6;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
        }
        button.active {
            background: #7c3aed;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.6);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button.buy {
            background: #10b981;
        }
        button.buy:hover:not(:disabled) {
            background: #059669;
        }
        button.sell {
            background: #ef4444;
        }
        button.sell:hover:not(:disabled) {
            background: #dc2626;
        }
        .dashboard {
            background: rgba(26, 31, 58, 0.8);
            border-radius: 16px;
            padding: 40px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }
        .price-card {
            background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 100%);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        .price { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .label { font-size: 1.2rem; opacity: 0.9; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #7c3aed; }
        .stat-label { margin-top: 8px; opacity: 0.7; }
        .trading-controls {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
        }
        .input-group {
            margin: 20px 0;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(124, 58, 237, 0.3);
            background: rgba(10, 14, 39, 0.8);
            color: white;
            font-size: 16px;
        }
        .trade-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .trade-buttons button {
            flex: 1;
        }
        .wallet-notice {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="emoji">🐙</span>Volume Bot Dashboard</h1>
            <div id="wallet-status">
                <button onclick="connectWallet()">Connect Wallet</button>
            </div>
        </header>
        <div class="token-selector">
            <h2>Select Token</h2>
            <div class="buttons">
                <button id="btn-rain" onclick="selectToken('rain')">RAIN</button>
                <button id="btn-gems" onclick="selectToken('gems-vip')">GEMS-VIP</button>
            </div>
        </div>
        <div id="dashboard" style="display: none;"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        let currentToken = null;
        let priceInterval = null;
        let walletAddress = null;
        let signer = null;

        const RAIN_ADDRESS = '0x0000000000000000000000000000000000000000';
        const GEMS_ADDRESS = '0x0000000000000000000000000000000000000000';
        const UNISWAP_ROUTER = '0x68b3465833fb72A70ecDF485E0e4C7bD8665Fc45';

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send('eth_requestAccounts', []);
                    signer = provider.getSigner();
                    walletAddress = await signer.getAddress();
                    document.getElementById('wallet-status').innerHTML = 
                        `<span style="color: #10b981;">✓ Connected: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}</span>`;
                    if (currentToken) {
                        await updateDashboard(currentToken);
                    }
                } catch (error) {
                    alert('Failed to connect: ' + error.message);
                }
            } else {
                alert('Please install MetaMask from metamask.io');
            }
        }

        async function selectToken(tokenId) {
            currentToken = tokenId;
            document.getElementById('btn-rain').classList.remove('active');
            document.getElementById('btn-gems').classList.remove('active');
            document.getElementById(`btn-${tokenId === 'rain' ? 'rain' : 'gems'}`).classList.add('active');
            if (priceInterval) clearInterval(priceInterval);
            await updateDashboard(tokenId);
            priceInterval = setInterval(() => updateDashboard(tokenId), 5000);
        }

        async function updateDashboard(tokenId) {
            const dashboard = document.getElementById('dashboard');
            dashboard.style.display = 'block';
            try {
                const response = await fetch(
                    `https://pro-api.coingecko.com/api/v3/simple/price?ids=${tokenId}&vs_currencies=usd&include_24hr_vol=true&include_24hr_change=true&include_market_cap=true`,
                    { headers: { 'x-cg-pro-api-key': 'CG-Qa4xRCrDuHn2232ArjgSwA8g' } }
                );
                const data = await response.json();
                const tokenData = data[tokenId];
                if (!tokenData) throw new Error('Token data not available');

                const tokenName = tokenId === 'rain' ? 'RAIN' : 'GEMS-VIP';
                const price = tokenData.usd || 0;
                const change24h = tokenData.usd_24h_change || 0;
                const volume24h = tokenData.usd_24h_vol || 0;
                const marketCap = tokenData.usd_market_cap || 0;

                dashboard.innerHTML = `
                    <div class="dashboard">
                        <h2>${tokenName} Dashboard</h2>
                        <div class="price-card">
                            <div class="label">Current Price</div>
                            <div class="price">$${price.toFixed(6)}</div>
                            <div class="label" style="color: ${change24h >= 0 ? '#10b981' : '#ef4444'}">
                                ${change24h >= 0 ? '▲' : '▼'} ${Math.abs(change24h).toFixed(2)}% (24h)
                            </div>
                        </div>
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-value">$${(volume24h / 1000000).toFixed(2)}M</div>
                                <div class="stat-label">24h Volume</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">$${(marketCap / 1000000).toFixed(2)}M</div>
                                <div class="stat-label">Market Cap</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${new Date().toLocaleTimeString()}</div>
                                <div class="stat-label">Last Update</div>
                            </div>
                        </div>
                        <div class="trading-controls">
                            <h3>🤖 Trading Controls</h3>
                            ${!walletAddress ? '<div class="wallet-notice">⚠️ Connect wallet to enable trading</div>' : ''}
                            <div class="input-group">
                                <label>Amount (ETH)</label>
                                <input type="number" id="amount" step="0.001" value="0.01" placeholder="0.01" ${!walletAddress ? 'disabled' : ''}>
                            </div>
                            <div class="trade-buttons">
                                <button class="buy" onclick="executeTrade('buy')" id="buyBtn" ${!walletAddress ? 'disabled' : ''}>
                                    🟢 BUY ${tokenName}
                                </button>
                                <button class="sell" onclick="executeTrade('sell')" id="sellBtn" ${!walletAddress ? 'disabled' : ''}>
                                    🔴 SELL ${tokenName}
                                </button>
                            </div>
                            <p style="margin-top: 15px; opacity: 0.6; font-size: 14px; text-align: center;">
                                ⚠️ Demo mode. Replace token addresses before real trading.
                            </p>
                        </div>
                    </div>
                `;
            } catch (error) {
                dashboard.innerHTML = `<div class="dashboard"><p style="color: #ef4444;">Failed to load: ${error.message}</p></div>`;
            }
        }

        async function executeTrade(action) {
            if (!signer) {
                alert('Please connect wallet first (click Connect Wallet button at the top)');
                return;
            }

            const amount = document.getElementById('amount').value;
            if (!amount || parseFloat(amount) <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            const btn = document.getElementById(action === 'buy' ? 'buyBtn' : 'sellBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = action === 'buy' ? '⏳ Buying...' : '⏳ Selling...';

            try {
                const tokenAddress = currentToken === 'rain' ? RAIN_ADDRESS : GEMS_ADDRESS;
                
                // Demo alert
                alert(`${action.toUpperCase()} order: ${amount} ETH\n\nToken: ${tokenAddress}\nRouter: ${UNISWAP_ROUTER}\n\n⚠️ This is demo mode. Add real swap logic here.`);
                
            } catch (error) {
                alert('Transaction failed: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        // Auto-select RAIN on load
        window.addEventListener('load', () => { 
            selectToken('rain'); 
        });
    </script>
</body>
</html>
