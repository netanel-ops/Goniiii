<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בוט נפח מסחר - RAIN & GEMS-VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .wallet-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .connect-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .connect-btn:hover {
            transform: translateY(-2px);
        }
        
        .connect-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .wallet-info {
            display: none;
            margin-top: 15px;
        }
        
        .wallet-info.active {
            display: block;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-label {
            font-weight: bold;
            color: #666;
        }
        
        .info-value {
            color: #333;
            font-family: monospace;
        }
        
        .token-section {
            margin-bottom: 25px;
        }
        
        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px 10px 0 0;
        }
        
        .token-name {
            font-size: 20px;
            font-weight: bold;
        }
        
        .token-chain {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .token-body {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 0 0 10px 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .mode-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mode-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .control-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .start-btn, .stop-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .start-btn {
            background: #10b981;
            color: white;
        }
        
        .start-btn:hover {
            background: #059669;
        }
        
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stop-btn {
            background: #ef4444;
            color: white;
        }
        
        .stop-btn:hover {
            background: #dc2626;
        }
        
        .stop-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .status-header {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .log-container {
            max-height: 300px;
            overflow-y: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .log-entry.success {
            color: #10b981;
        }
        
        .log-entry.error {
            color: #ef4444;
        }
        
        .log-entry.info {
            color: #3b82f6;
        }
        
        .price-display {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .price-item {
            text-align: center;
        }
        
        .price-label {
            font-size: 12px;
            color: #666;
        }
        
        .price-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 בוט נפח מסחר אוטומטי</h1>
        <p class="subtitle">RAIN (Arbitrum) & GEMS-VIP (Ethereum)</p>
        
        <div class="wallet-section">
            <button id="connectBtn" class="connect-btn">🔗 התחבר לארנק</button>
            <div id="walletInfo" class="wallet-info">
                <div class="info-row">
                    <span class="info-label">כתובת ארנק:</span>
                    <span class="info-value" id="walletAddress"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">רשת נוכחית:</span>
                    <span class="info-value" id="currentChain"></span>
                </div>
            </div>
        </div>

        <div class="token-section">
            <div class="token-header">
                <div>
                    <div class="token-name">RAIN 💧</div>
                    <div class="token-chain">Arbitrum</div>
                </div>
            </div>
            <div class="token-body">
                <div class="price-display">
                    <div class="price-item">
                        <div class="price-label">מחיר</div>
                        <div class="price-value" id="rainPrice">$0.00</div>
                    </div>
                    <div class="price-item">
                        <div class="price-label">יתרה</div>
                        <div class="price-value" id="rainBalance">0</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>כמות למסחר (RAIN):</label>
                    <input type="number" id="rainAmount" value="1" step="0.1" min="0.01">
                </div>
            </div>
        </div>

        <div class="token-section">
            <div class="token-header">
                <div>
                    <div class="token-name">GEMS-VIP 💎</div>
                    <div class="token-chain">Ethereum</div>
                </div>
            </div>
            <div class="token-body">
                <div class="price-display">
                    <div class="price-item">
                        <div class="price-label">מחיר</div>
                        <div class="price-value" id="gemsPrice">$0.00</div>
                    </div>
                    <div class="price-item">
                        <div class="price-label">יתרה</div>
                        <div class="price-value" id="gemsBalance">0</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>כמות למסחר (GEMS-VIP):</label>
                    <input type="number" id="gemsAmount" value="1" step="0.1" min="0.01">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>מצב פעולה:</label>
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="BOTH">שניהם</button>
                <button class="mode-btn" data-mode="BUY">קנייה בלבד</button>
                <button class="mode-btn" data-mode="SELL">מכירה בלבד</button>
            </div>
        </div>

        <div class="form-group">
            <label>מספר מחזורים:</label>
            <input type="number" id="cycles" value="10" min="1">
        </div>

        <div class="form-group">
            <label>השהייה בין מסחרים (שניות):</label>
            <input type="number" id="delay" value="30" min="5">
        </div>

        <div class="control-buttons">
            <button id="startBtn" class="start-btn" disabled>▶️ התחל מסחר</button>
            <button id="stopBtn" class="stop-btn" disabled>⏹️ עצור</button>
        </div>

        <div class="status-section">
            <div class="status-header">📊 סטטיסטיקות</div>
            <div class="status-grid">
                <div class="stat-card">
                    <div class="stat-label">מחזור נוכחי</div>
                    <div class="stat-value" id="currentCycle">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">מסחרים מוצלחים</div>
                    <div class="stat-value" id="successTrades">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">מסחרים כושלים</div>
                    <div class="stat-value" id="failedTrades">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">נפח כולל (USD)</div>
                    <div class="stat-value" id="totalVolume">$0</div>
                </div>
            </div>
            
            <div class="status-header">📝 יומן פעילות</div>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            RAIN: {
                address: '0x25118290e6a5f4139381d072181157035864099d',
                chain: 'arbitrum',
                chainId: 42161,
                rpcUrl: 'https://arb1.arbitrum.io/rpc',
                router: '0x1b02dA8Cb0d097eB8D57A175b88c7D8b47997506', // Sushiswap on Arbitrum
                weth: '0x82aF49447D8a07e3bd95BD0d56f35241523fBab1',
                coingeckoId: 'rain-token'
            },
            GEMS: {
                address: '0x3010ccb5419f1ef26d40a7cd3f0d707a0fa127dc',
                chain: 'ethereum',
                chainId: 1,
                rpcUrl: 'https://eth.llamarpc.com',
                router: '0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D', // Uniswap V2
                weth: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2',
                coingeckoId: 'gems-vip'
            },
            COINGECKO_API_KEY: 'CG-Qa4xRCrDuHn2232ArjgSwA8g'
        };

        // Router ABI (minimal for swaps)
        const ROUTER_ABI = [
            {
                "inputs": [
                    {"internalType": "uint256", "name": "amountIn", "type": "uint256"},
                    {"internalType": "uint256", "name": "amountOutMin", "type": "uint256"},
                    {"internalType": "address[]", "name": "path", "type": "address[]"},
                    {"internalType": "address", "name": "to", "type": "address"},
                    {"internalType": "uint256", "name": "deadline", "type": "uint256"}
                ],
                "name": "swapExactTokensForTokens",
                "outputs": [{"internalType": "uint256[]", "name": "amounts", "type": "uint256[]"}],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [
                    {"internalType": "uint256", "name": "amountOutMin", "type": "uint256"},
                    {"internalType": "address[]", "name": "path", "type": "address[]"},
                    {"internalType": "address", "name": "to", "type": "address"},
                    {"internalType": "uint256", "name": "deadline", "type": "uint256"}
                ],
                "name": "swapExactETHForTokens",
                "outputs": [{"internalType": "uint256[]", "name": "amounts", "type": "uint256[]"}],
                "stateMutability": "payable",
                "type": "function"
            },
            {
                "inputs": [
                    {"internalType": "uint256", "name": "amountIn", "type": "uint256"},
                    {"internalType": "uint256", "name": "amountOutMin", "type": "uint256"},
                    {"internalType": "address[]", "name": "path", "type": "address[]"},
                    {"internalType": "address", "name": "to", "type": "address"},
                    {"internalType": "uint256", "name": "deadline", "type": "uint256"}
                ],
                "name": "swapExactTokensForETH",
                "outputs": [{"internalType": "uint256[]", "name": "amounts", "type": "uint256[]"}],
                "stateMutability": "nonpayable",
                "type": "function"
            }
        ];

        // ERC20 ABI
        const ERC20_ABI = [
            {
                "constant": true,
                "inputs": [{"name": "_owner", "type": "address"}],
                "name": "balanceOf",
                "outputs": [{"name": "balance", "type": "uint256"}],
                "type": "function"
            },
            {
                "constant": false,
                "inputs": [
                    {"name": "_spender", "type": "address"},
                    {"name": "_value", "type": "uint256"}
                ],
                "name": "approve",
                "outputs": [{"name": "", "type": "bool"}],
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [
                    {"name": "_owner", "type": "address"},
                    {"name": "_spender", "type": "address"}
                ],
                "name": "allowance",
                "outputs": [{"name": "", "type": "uint256"}],
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [],
                "name": "decimals",
                "outputs": [{"name": "", "type": "uint8"}],
                "type": "function"
            }
        ];

        // State
        let web3;
        let account;
        let currentMode = 'BOTH';
        let isRunning = false;
        let currentCycle = 0;
        let stats = {
            success: 0,
            failed: 0,
            volume: 0
        };
        let prices = {
            rain: 0,
            gems: 0
        };
        let approvals = {
            rain: false,
            gems: false
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            setupEventListeners();
            startPriceUpdates();
        }

        function setupEventListeners() {
            document.getElementById('connectBtn').addEventListener('click', connectWallet);
            document.getElementById('startBtn').addEventListener('click', startBot);
            document.getElementById('stopBtn').addEventListener('click', stopBot);
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentMode = e.target.dataset.mode;
                    log(`מצב פעולה שונה ל: ${currentMode}`, 'info');
                });
            });
        }

        async function connectWallet() {
            try {
                if (typeof window.ethereum === 'undefined') {
                    alert('אנא התקן MetaMask!');
                    return;
                }

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                web3 = new Web3(window.ethereum);

                document.getElementById('walletAddress').textContent = 
                    account.substring(0, 6) + '...' + account.substring(38);
                
                const chainId = await web3.eth.getChainId();
                document.getElementById('currentChain').textContent = getChainName(chainId);
                
                document.getElementById('walletInfo').classList.add('active');
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('startBtn').disabled = false;
                
                log('ארנק מחובר בהצלחה!', 'success');
                
                updateBalances();
                
                // Listen for account/chain changes
                window.ethereum.on('accountsChanged', (accounts) => {
                    if (accounts.length === 0) {
                        location.reload();
                    } else {
                        account = accounts[0];
                        updateBalances();
                    }
                });
                
                window.ethereum.on('chainChanged', () => {
                    location.reload();
                });
                
            } catch (error) {
                console.error(error);
                log('שגיאה בחיבור ארנק: ' + error.message, 'error');
            }
        }

        function getChainName(chainId) {
            const chains = {
                1: 'Ethereum',
                42161: 'Arbitrum'
            };
            return chains[chainId] || `Chain ${chainId}`;
        }

        async function updateBalances() {
            try {
                // Update RAIN balance
                const rainWeb3 = new Web3(CONFIG.RAIN.rpcUrl);
                const rainContract = new rainWeb3.eth.Contract(ERC20_ABI, CONFIG.RAIN.address);
                const rainBalance = await rainContract.methods.balanceOf(account).call();
                const rainDecimals = await rainContract.methods.decimals().call();
                document.getElementById('rainBalance').textContent = 
                    (rainBalance / Math.pow(10, rainDecimals)).toFixed(2);

                // Update GEMS balance
                const gemsWeb3 = new Web3(CONFIG.GEMS.rpcUrl);
                const gemsContract = new gemsWeb3.eth.Contract(ERC20_ABI, CONFIG.GEMS.address);
                const gemsBalance = await gemsContract.methods.balanceOf(account).call();
                const gemsDecimals = await gemsContract.methods.decimals().call();
                document.getElementById('gemsBalance').textContent = 
                    (gemsBalance / Math.pow(10, gemsDecimals)).toFixed(2);
                
            } catch (error) {
                console.error('Error updating balances:', error);
            }
        }

        async function startPriceUpdates() {
            updatePrices();
            setInterval(updatePrices, 60000); // Update every minute
        }

        async function updatePrices() {
            try {
                const response = await fetch(
                    `https://pro-api.coingecko.com/api/v3/simple/price?ids=${CONFIG.RAIN.coingeckoId},${CONFIG.GEMS.coingeckoId}&vs_currencies=usd`,
                    {
                        headers: {
                            'X-Cg-Pro-Api-Key': CONFIG.COINGECKO_API_KEY
                        }
                    }
                );
                
                if (response.ok) {
                    const data = await response.json();
                    prices.rain = data[CONFIG.RAIN.coingeckoId]?.usd || 0;
                    prices.gems = data[CONFIG.GEMS.coingeckoId]?.usd || 0;
                    
                    document.getElementById('rainPrice').textContent = '$' + prices.rain.toFixed(6);
                    document.getElementById('gemsPrice').textContent = '$' + prices.gems.toFixed(6);
                }
            } catch (error) {
                console.error('Error updating prices:', error);
            }
        }

        async function startBot() {
            if (!account) {
                log('אנא התחבר לארנק תחילה', 'error');
                return;
            }

            const cycles = parseInt(document.getElementById('cycles').value);
            const delay = parseInt(document.getElementById('delay').value) * 1000;
            
            if (cycles < 1 || delay < 5000) {
                log('ערכים לא תקינים', 'error');
                return;
            }

            isRunning = true;
            currentCycle = 0;
            stats = { success: 0, failed: 0, volume: 0 };
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            log(`🚀 בוט התחיל! מצב: ${currentMode}, מחזורים: ${cycles}`, 'success');
            
            for (let i = 0; i < cycles && isRunning; i++) {
                currentCycle = i + 1;
                updateStats();
                
                log(`--- מחזור ${currentCycle}/${cycles} ---`, 'info');
                
                if (currentMode === 'BUY' || currentMode === 'BOTH') {
                    await executeTrade('RAIN', 'BUY');
                    if (isRunning) await sleep(delay / 2);
                    await executeTrade('GEMS', 'BUY');
                }
                
                if (currentMode === 'SELL' || currentMode === 'BOTH') {
                    if (currentMode === 'BOTH') await sleep(delay / 2);
                    await executeTrade('RAIN', 'SELL');
                    if (isRunning) await sleep(delay / 2);
                    await executeTrade('GEMS', 'SELL');
                }
                
                if (isRunning && i < cycles - 1) {
                    log(`⏳ המתנה ${delay/1000} שניות...`, 'info');
                    await sleep(delay);
                }
            }
            
            if (isRunning) {
                log('✅ כל המחזורים הושלמו!', 'success');
                stopBot();
            }
        }

        function stopBot() {
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            log('🛑 בוט נעצר', 'info');
        }

        async function executeTrade(token, action) {
            if (!isRunning) return;
            
            const config = token === 'RAIN' ? CONFIG.RAIN : CONFIG.GEMS;
            const amount = parseFloat(document.getElementById(token === 'RAIN' ? 'rainAmount' : 'gemsAmount').value);
            
            try {
                log(`${action === 'BUY' ? '🟢 קונה' : '🔴 מוכר'} ${amount} ${token}...`, 'info');
                
                // Switch to correct chain
                await switchChain(config.chainId);
                
                if (action === 'BUY') {
                    await buyToken(config, amount);
                } else {
                    await sellToken(config, amount);
                }
                
                stats.success++;
                stats.volume += amount * (token === 'RAIN' ? prices.rain : prices.gems);
                log(`✅ ${action} ${token} הושלם בהצלחה!`, 'success');
                
                await updateBalances();
                
            } catch (error) {
                stats.failed++;
                log(`❌ שגיאה ב-${action} ${token}: ${error.message}`, 'error');
                console.error(error);
            }
            
            updateStats();
        }

        async function switchChain(targetChainId) {
            const currentChainId = await web3.eth.getChainId();
            if (currentChainId === targetChainId) return;
            
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x' + targetChainId.toString(16) }],
                });
                
                // Wait a bit for the switch to complete
                await sleep(1000);
                web3 = new Web3(window.ethereum);
                
            } catch (error) {
                if (error.code === 4902) {
                    // Chain not added, add it
                    if (targetChainId === 42161) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: '0xa4b1',
                                chainName: 'Arbitrum One',
                                nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                                rpcUrls: ['https://arb1.arbitrum.io/rpc'],
                                blockExplorerUrls: ['https://arbiscan.io']
                            }]
                        });
                        await sleep(1000);
                        web3 = new Web3(window.ethereum);
                    }
                } else {
                    throw error;
                }
            }
        }

        async function buyToken(config, amount) {
            const router = new web3.eth.Contract(ROUTER_ABI, config.router);
            
            // Calculate ETH amount needed (rough estimate)
            const ethAmount = web3.utils.toWei((amount * 0.0001).toString(), 'ether'); // Adjust multiplier as needed
            
            const deadline = Math.floor(Date.now() / 1000) + 300; // 5 minutes
            const path = [config.weth, config.address];
            
            const tx = router.methods.swapExactETHForTokens(
                '0', // amountOutMin (accept any amount - use 0 for testing, add slippage in production)
                path,
                account,
                deadline
            );
            
            await tx.send({
                from: account,
                value: ethAmount,
                gas: 300000
            });
        }

        async function sellToken(config, amount) {
            const tokenContract = new web3.eth.Contract(ERC20_ABI, config.address);
            const decimals = await tokenContract.methods.decimals().call();
            const amountWei = web3.utils.toBN(amount * Math.pow(10, decimals));
            
            // Check and approve if needed (SINGLE APPROVAL)
            const allowance = await tokenContract.methods.allowance(account, config.router).call();
            if (web3.utils.toBN(allowance).lt(amountWei)) {
                log(`🔓 מאשר גישה ל-${config.chain === 'arbitrum' ? 'RAIN' : 'GEMS'}...`, 'info');
                const approveTx = tokenContract.methods.approve(
                    config.router,
                    '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff' // Max approval
                );
                await approveTx.send({ from: account, gas: 100000 });
                log(`✅ אישור הושלם`, 'success');
            }
            
            const router = new web3.eth.Contract(ROUTER_ABI, config.router);
            const deadline = Math.floor(Date.now() / 1000) + 300;
            const path = [config.address, config.weth];
            
            const tx = router.methods.swapExactTokensForETH(
                amountWei.toString(),
                '0', // amountOutMin (accept any amount)
                path,
                account,
                deadline
            );
            
            await tx.send({
                from: account,
                gas: 300000
            });
        }

        function updateStats() {
            document.getElementById('currentCycle').textContent = currentCycle;
            document.getElementById('successTrades').textContent = stats.success;
            document.getElementById('failedTrades').textContent = stats.failed;
            document.getElementById('totalVolume').textContent = '$' + stats.volume.toFixed(2);
        }

        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString('he-IL');
            entry.textContent = `[${timestamp}] ${message}`;
            logContainer.insertBefore(entry, logContainer.firstChild);
            
            // Keep only last 50 entries
            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
