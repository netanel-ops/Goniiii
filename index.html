<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בוט נפח מסחר - Volume Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .token-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .token-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: white;
        }
        
        .token-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .token-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .token-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .token-network {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: right;
        }
        
        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .info-box ul {
            list-style: none;
            color: #666;
        }
        
        .info-box li {
            margin: 8px 0;
            padding-right: 20px;
            position: relative;
        }
        
        .info-box li:before {
            content: "✓";
            position: absolute;
            right: 0;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 בוט נפח מסחר</h1>
        <p class="subtitle">בחר את הטוקן שברצונך לסחור</p>
        
        <div class="token-grid">
            <a href="rain.html" class="token-card">
                <div class="token-icon">🌧️</div>
                <div class="token-name">RAIN</div>
                <div class="token-network">Arbitrum One</div>
            </a>
            
            <a href="gems.html" class="token-card">
                <div class="token-icon">💎</div>
                <div class="token-name">GEMS-VIP</div>
                <div class="token-network">Ethereum</div>
            </a>
        </div>
        
        <div class="info-box">
            <h3>תכונות הבוט:</h3>
            <ul>
                <li>חיבור ארנק אוטומטי עם שמירת מצב</li>
                <li>מחירים בזמן אמת מ-CoinGecko Pro</li>
                <li>הזנת סכומים בדולרים (USD)</li>
                <li>מסחר אוטומטי עם מחזורים</li>
                <li>סטטיסטיקות מסחר חיות</li>
                <li>חתימה אחת לכל עסקה</li>
            </ul>
        </div>
    </div>
</body>
</html>
