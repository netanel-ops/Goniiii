<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume Bot - RAIN & GEMS-VIP Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        h1 { font-size: 2rem; }
        .emoji { font-size: 2.5rem; margin-right: 10px; }
        .token-selector { text-align: center; margin: 40px 0; }
        .buttons { display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        button {
            background: #5b21b6;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
        }
        button.active {
            background: #7c3aed;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.6);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.buy { background: #10b981; }
        button.buy:hover:not(:disabled) { background: #059669; }
        button.sell { background: #ef4444; }
        button.sell:hover:not(:disabled) { background: #dc2626; }
        button.bot { background: #f59e0b; font-size: 20px; padding: 18px 40px; }
        button.bot:hover:not(:disabled) { background: #d97706; }
        button.stop { background: #dc2626; }
        .dashboard {
            background: rgba(26, 31, 58, 0.8);
            border-radius: 16px;
            padding: 40px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }
        .price-card {
            background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 100%);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        .price { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .label { font-size: 1.2rem; opacity: 0.9; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #7c3aed; }
        .stat-label { margin-top: 8px; opacity: 0.7; }
        .trading-controls, .holdings, .bot-controls {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
        }
        .input-group { margin: 20px 0; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(124, 58, 237, 0.3);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
        }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .trade-buttons { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .trade-buttons button { flex: 1; min-width: 200px; }
        .wallet-notice {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid #f59e0b;
            color: #fbbf24;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
        }
        .network-badge {
            background: rgba(124, 58, 237, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        .holdings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .holding-card {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .holding-value {
            font-size: 2rem;
            font-weight: bold;
            color: #7c3aed;
            margin: 10px 0;
        }
        .contract-address {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
            margin: 15px 0;
            word-break: break-all;
        }
        .eth-equivalent {
            margin-top: 8px;
            color: #7c3aed;
            font-size: 0.9rem;
        }
        .bot-log {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .bot-log div { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .bot-status {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid #7c3aed;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="emoji">🤖</span> Volume Bot</h1>
            <button onclick="connectWallet()" id="wallet-btn">📲 Connect Wallet</button>
            <div id="wallet-status"></div>
        </header>
        <div class="token-selector">
            <h2>Select Token</h2>
            <div class="buttons">
                <button id="btn-rain" onclick="selectToken('rain')">⚡ RAIN</button>
                <button id="btn-gems" onclick="selectToken('gems-vip')">💎 GEMS-VIP</button>
            </div>
        </div>
        <div id="dashboard" style="display: none;"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        let currentToken = null;
        let priceInterval = null;
        let walletAddress = null;
        let signer = null;
        let provider = null;
        let currentPrice = 0;
        let ethPrice = 0;
        let botRunning = false;
        let botStopped = false;

        const TOKENS = {
            'rain': {
                address: '0x25118290e6a5f4139381d072181157035864099d',
                chainId: 42161,
                chainName: 'Arbitrum One',
                router: '0xE592427A0AEce92De3Edee1F18E0157C05861564'
            },
            'gems-vip': {
                address: '0x3010ccb5419f1ef26d40a7cd3f0d707a0fa127dc',
                chainId: 1,
                chainName: 'Ethereum',
                router: '0xE592427A0AEce92De3Edee1F18E0157C05861564'
            }
        };

        const WETH = {
            1: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2',
            42161: '0x82aF49447D8a07e3bd95BD0d56f35241523fBab1'
        };

        const ERC20_ABI = [
            'function approve(address spender, uint256 amount) returns (bool)',
            'function allowance(address owner, address spender) view returns (uint256)',
            'function balanceOf(address account) view returns (uint256)',
            'function decimals() view returns (uint8)',
            'function withdraw(uint256 amount)'
        ];

        const ROUTER_ABI = [
            'function exactInputSingle((address tokenIn, address tokenOut, uint24 fee, address recipient, uint256 deadline, uint256 amountIn, uint256 amountOutMinimum, uint160 sqrtPriceLimitX96)) payable returns (uint256 amountOut)'
        ];

        const WETH_ABI = [
            'function withdraw(uint256 amount)',
            'function balanceOf(address account) view returns (uint256)'
        ];

        function logBot(message) {
            const log = document.getElementById('botLog');
            if (log) {
                const time = new Date().toLocaleTimeString();
                const entry = document.createElement('div');
                entry.textContent = `[${time}] ${message}`;
                log.insertBefore(entry, log.firstChild);
                if (log.children.length > 20) log.removeChild(log.lastChild);
            }
        }

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send('eth_requestAccounts', []);
                    signer = provider.getSigner();
                    walletAddress = await signer.getAddress();
                    document.getElementById('wallet-status').innerHTML = 
                        `<span style="color: #10b981;">✓ ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}</span>`;
                    if (currentToken) await updateDashboard(currentToken);
                } catch (error) {
                    alert('Failed to connect: ' + error.message);
                }
            } else {
                alert('Please install MetaMask');
            }
        }

        async function switchNetwork(chainId) {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x' + chainId.toString(16) }],
                });
                return true;
            } catch (error) {
                return false;
            }
        }

        async function selectToken(tokenId) {
            currentToken = tokenId;
            document.getElementById('btn-rain').classList.remove('active');
            document.getElementById('btn-gems').classList.remove('active');
            document.getElementById(`btn-${tokenId === 'rain' ? 'rain' : 'gems'}`).classList.add('active');
            if (priceInterval) clearInterval(priceInterval);
            await updateDashboard(tokenId);
            priceInterval = setInterval(() => updateDashboard(tokenId), 5000);
        }

        function updateAmountDisplay() {
            const usdAmount = document.getElementById('usdAmount').value;
            const ethAmount = parseFloat(usdAmount) / ethPrice;
            const tokenAmount = parseFloat(usdAmount) / currentPrice;
            document.getElementById('ethEquivalent').textContent = 
                `≈ ${ethAmount.toFixed(4)} ETH or ${tokenAmount.toFixed(2)} tokens`;
        }

        async function getHoldings() {
            if (!walletAddress || !provider) return null;
            try {
                const config = TOKENS[currentToken];
                const network = await provider.getNetwork();
                if (network.chainId !== config.chainId) return { needsSwitch: true };

                const token = new ethers.Contract(config.address, ERC20_ABI, provider);
                const [tokenBalance, ethBalance, decimals] = await Promise.all([
                    token.balanceOf(walletAddress),
                    provider.getBalance(walletAddress),
                    token.decimals()
                ]);

                return {
                    tokenBalance: ethers.utils.formatUnits(tokenBalance, decimals),
                    ethBalance: ethers.utils.formatEther(ethBalance),
                    needsSwitch: false
                };
            } catch (error) {
                return null;
            }
        }

        async function updateDashboard(tokenId) {
            const dashboard = document.getElementById('dashboard');
            dashboard.style.display = 'block';
            
            try {
                const [priceRes, ethPriceRes] = await Promise.all([
                    fetch(
                        `https://pro-api.coingecko.com/api/v3/simple/price?ids=${tokenId}&vs_currencies=usd&include_24hr_vol=true&include_24hr_change=true&include_market_cap=true`,
                        { headers: { 'x-cg-pro-api-key': 'CG-Qa4xRCrDuHn2232ArjgSwA8g' } }
                    ),
                    fetch(
                        'https://pro-api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd',
                        { headers: { 'x-cg-pro-api-key': 'CG-Qa4xRCrDuHn2232ArjgSwA8g' } }
                    )
                ]);

                const data = await priceRes.json();
                const ethData = await ethPriceRes.json();
                const tokenData = data[tokenId];
                if (!tokenData) throw new Error('Token data not available');

                currentPrice = tokenData.usd || 0;
                ethPrice = ethData.ethereum.usd || 0;

                const config = TOKENS[tokenId];
                const tokenName = tokenId === 'rain' ? 'RAIN' : 'GEMS-VIP';
                const change24h = tokenData.usd_24h_change || 0;
                const volume24h = tokenData.usd_24h_vol || 0;
                const marketCap = tokenData.usd_market_cap || 0;

                const holdings = await getHoldings();

                let holdingsHTML = '';
                if (walletAddress) {
                    if (holdings && holdings.needsSwitch) {
                        holdingsHTML = `
                            <div class="holdings">
                                <h3>💼 Your Holdings</h3>
                                <div class="wallet-notice">⚠️ Switch to ${config.chainName}</div>
                            </div>
                        `;
                    } else if (holdings) {
                        holdingsHTML = `
                            <div class="holdings">
                                <h3>💼 Your Holdings</h3>
                                <div class="holdings-grid">
                                    <div class="holding-card">
                                        <div class="stat-label">${tokenName} Balance</div>
                                        <div class="holding-value">${parseFloat(holdings.tokenBalance).toFixed(4)}</div>
                                        <div class="stat-label" style="opacity: 0.6;">≈ $${(parseFloat(holdings.tokenBalance) * currentPrice).toFixed(2)}</div>
                                    </div>
                                    <div class="holding-card">
                                        <div class="stat-label">ETH Balance</div>
                                        <div class="holding-value">${parseFloat(holdings.ethBalance).toFixed(4)}</div>
                                        <div class="stat-label" style="opacity: 0.6;">≈ $${(parseFloat(holdings.ethBalance) * ethPrice).toFixed(2)}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }

                dashboard.innerHTML = `
                    <div class="dashboard">
                        <h2>${tokenName} Dashboard <span class="network-badge">⛓️ ${config.chainName}</span></h2>
                        <div class="contract-address">
                            <strong>Contract:</strong> ${config.address}
                        </div>
                        <div class="price-card">
                            <div class="label">Current Price</div>
                            <div class="price">$${currentPrice.toFixed(6)}</div>
                            <div class="label" style="color: ${change24h >= 0 ? '#10b981' : '#ef4444'}">
                                ${change24h >= 0 ? '▲' : '▼'} ${Math.abs(change24h).toFixed(2)}% (24h)
                            </div>
                        </div>
                        ${holdingsHTML}
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-value">$${(volume24h / 1000000).toFixed(2)}M</div>
                                <div class="stat-label">24h Volume</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">$${(marketCap / 1000000).toFixed(2)}M</div>
                                <div class="stat-label">Market Cap</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${new Date().toLocaleTimeString()}</div>
                                <div class="stat-label">Last Update</div>
                            </div>
                        </div>
                        
                        <div class="bot-controls">
                            <h3>🤖 Volume Bot</h3>
                            ${!walletAddress ? '<div class="wallet-notice">⚠️ Connect wallet first</div>' : ''}
                            <div class="input-group">
                                <label>Amount per trade (USD)</label>
                                <input type="number" id="usdAmount" step="0.01" value="10" placeholder="10.00" 
                                    ${!walletAddress ? 'disabled' : ''} oninput="updateAmountDisplay()">
                                <div class="eth-equivalent" id="ethEquivalent">≈ ${(10/ethPrice).toFixed(4)} ETH</div>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label>Cycles (כמות פעמים)</label>
                                    <input type="number" id="cycles" min="1" value="5" ${!walletAddress ? 'disabled' : ''}>
                                </div>
                                <div class="input-group">
                                    <label>Delay (שניות בין פעולות)</label>
                                    <input type="number" id="delay" min="1" value="10" ${!walletAddress ? 'disabled' : ''}>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Bot Mode</label>
                                <select id="botMode" ${!walletAddress ? 'disabled' : ''}>
                                    <option value="both">BUY + SELL (Both)</option>
                                    <option value="buy">BUY Only</option>
                                    <option value="sell">SELL Only</option>
                                </select>
                            </div>
                            <div id="botStatus" style="display: none;" class="bot-status"></div>
                            <div class="trade-buttons">
                                <button class="bot" onclick="startBot()" id="startBotBtn" ${!walletAddress ? 'disabled' : ''}>
                                    🚀 START BOT
                                </button>
                                <button class="stop" onclick="stopBot()" id="stopBotBtn" disabled>
                                    ⛔ STOP BOT
                                </button>
                            </div>
                            <div id="botLog" class="bot-log" style="display: none;"></div>
                        </div>
                        
                        <div class="trading-controls">
                            <h3>💰 Manual Trading</h3>
                            <div class="trade-buttons">
                                <button class="buy" onclick="executeTrade('buy')" id="buyBtn" ${!walletAddress ? 'disabled' : ''}>
                                    🟢 BUY ${tokenName}
                                </button>
                                <button class="sell" onclick="executeTrade('sell')" id="sellBtn" ${!walletAddress ? 'disabled' : ''}>
                                    🔴 SELL ${tokenName}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                dashboard.innerHTML = `<div class="dashboard"><p style="color: #ef4444;">Error: ${error.message}</p></div>`;
            }
        }

        async function startBot() {
            if (botRunning) return;
            
            botRunning = true;
            botStopped = false;
            const cycles = parseInt(document.getElementById('cycles').value);
            const delay = parseInt(document.getElementById('delay').value) * 1000;
            const mode = document.getElementById('botMode').value;
            
            document.getElementById('startBotBtn').disabled = true;
            document.getElementById('stopBotBtn').disabled = false;
            document.getElementById('botLog').style.display = 'block';
            
            const statusDiv = document.getElementById('botStatus');
            statusDiv.style.display = 'block';
            
            logBot(`🚀 Bot started: ${cycles} cycles, ${delay/1000}s delay, mode: ${mode.toUpperCase()}`);
            
            for (let i = 1; i <= cycles; i++) {
                if (botStopped) {
                    logBot('⛔ Bot stopped by user');
                    break;
                }
                
                statusDiv.textContent = `🔄 Running cycle ${i}/${cycles}...`;
                logBot(`--- Cycle ${i}/${cycles} ---`);
                
                try {
                    if (mode === 'buy' || mode === 'both') {
                        await executeTrade('buy', true);
                        if (botStopped) break;
                        if (mode === 'both') await sleep(delay);
                    }
                    
                    if (mode === 'sell' || mode === 'both') {
                        if (botStopped) break;
                        await executeTrade('sell', true);
                    }
                    
                    if (i < cycles && !botStopped) {
                        logBot(`⏳ Waiting ${delay/1000}s...`);
                        await sleep(delay);
                    }
                } catch (error) {
                    logBot(`❌ Error in cycle ${i}: ${error.message}`);
                }
            }
            
            botRunning = false;
            document.getElementById('startBotBtn').disabled = false;
            document.getElementById('stopBotBtn').disabled = true;
            
            if (!botStopped) {
                statusDiv.textContent = '✅ Bot completed all cycles!';
                logBot('✅ Bot finished successfully');
            } else {
                statusDiv.textContent = '⛔ Bot stopped';
            }
            
            await updateDashboard(currentToken);
        }

        function stopBot() {
            botStopped = true;
            logBot('⛔ Stop requested...');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function executeTrade(action, fromBot = false) {
            if (!signer) {
                alert('Connect wallet first');
                return;
            }

            const config = TOKENS[currentToken];
            const usdAmount = parseFloat(document.getElementById('usdAmount').value);
            if (!usdAmount || usdAmount <= 0) {
                alert('Enter valid USD amount');
                return;
            }

            const network = await provider.getNetwork();
            if (network.chainId !== config.chainId) {
                if (!fromBot) alert(`Switch to ${config.chainName}`);
                await switchNetwork(config.chainId);
                return;
            }

            if (!fromBot) {
                const btn = document.getElementById(action === 'buy' ? 'buyBtn' : 'sellBtn');
                const originalText = btn.textContent;
                btn.disabled = true;
                btn.textContent = action === 'buy' ? '⏳ Buying...' : '⏳ Selling...';
            } else {
                logBot(`${action === 'buy' ? '🟢' : '🔴'} ${action.toUpperCase()} $${usdAmount}...`);
            }

            try {
                const ethAmount = usdAmount / ethPrice;
                const amountInWei = ethers.utils.parseEther(ethAmount.toFixed(18));
                const router = new ethers.Contract(config.router, ROUTER_ABI, signer);
                const deadline = Math.floor(Date.now() / 1000) + 600;

                if (action === 'buy') {
                    const params = {
                        tokenIn: WETH[config.chainId],
                        tokenOut: config.address,
                        fee: 10000,
                        recipient: walletAddress,
                        deadline: deadline,
                        amountIn: amountInWei,
                        amountOutMinimum: 0,
                        sqrtPriceLimitX96: 0
                    };
                    const tx = await router.exactInputSingle(params, { value: amountInWei });
                    await tx.wait();
                    if (fromBot) {
                        logBot(`✅ BUY complete: ${tx.hash.slice(0,10)}...`);
                    } else {
                        alert(`✅ Bought!\nTx: ${tx.hash}`);
                    }
                } else {
                    // SELL: Token -> WETH -> ETH (חזרה לארנק שלך!)
                    const token = new ethers.Contract(config.address, ERC20_ABI, signer);
                    const tokenAmount = usdAmount / currentPrice;
                    const decimals = await token.decimals();
                    const amountIn = ethers.utils.parseUnits(tokenAmount.toFixed(decimals), decimals);
                    
                    const balance = await token.balanceOf(walletAddress);
                    if (balance.lt(amountIn)) {
                        throw new Error('Insufficient token balance');
                    }

                    // בדיקה אם צריך אישור - רק פעם אחת!
                    const allowance = await token.allowance(walletAddress, config.router);
                    if (allowance.lt(amountIn)) {
                        if (fromBot) logBot('⏳ Approving tokens (one-time)...');
                        // אישור אינסופי - לא נצטרך יותר!
                        const approveTx = await token.approve(config.router, ethers.constants.MaxUint256);
                        await approveTx.wait();
                        if (fromBot) logBot('✅ Approval granted for future trades');
                    }

                    // מכירה: Token -> WETH
                    const wethAddress = WETH[config.chainId];
                    const params = {
                        tokenIn: config.address,
                        tokenOut: wethAddress,
                        fee: 10000,
                        recipient: walletAddress, // WETH יגיע לארנק שלך
                        deadline: deadline,
                        amountIn: amountIn,
                        amountOutMinimum: 0,
                        sqrtPriceLimitX96: 0
                    };
                    const swapTx = await router.exactInputSingle(params);
                    await swapTx.wait();
                    if (fromBot) logBot(`✅ Token -> WETH swap: ${swapTx.hash.slice(0,10)}...`);

                    // המרה: WETH -> ETH (חזרה לארנק שלך!)
                    const weth = new ethers.Contract(wethAddress, WETH_ABI, signer);
                    const wethBalance = await weth.balanceOf(walletAddress);
                    
                    if (wethBalance.gt(0)) {
                        if (fromBot) logBot('⏳ Converting WETH -> ETH...');
                        const withdrawTx = await weth.withdraw(wethBalance);
                        await withdrawTx.wait();
                        if (fromBot) {
                            logBot(`✅ SELL complete! ETH back in wallet: ${withdrawTx.hash.slice(0,10)}...`);
                        } else {
                            alert(`✅ Sold and converted to ETH!\nSwap: ${swapTx.hash}\nWithdraw: ${withdrawTx.hash}`);
                        }
                    }
                }
            } catch (error) {
                console.error('Trade error:', error);
                if (fromBot) {
                    logBot(`❌ ${action.toUpperCase()} failed: ${error.reason || error.message}`);
                    throw error;
                } else {
                    alert('Failed: ' + (error.reason || error.message));
                }
            } finally {
                if (!fromBot) {
                    const btn = document.getElementById(action === 'buy' ? 'buyBtn' : 'sellBtn');
                    btn.disabled = false;
                    btn.textContent = action === 'buy' ? '🟢 BUY' : '�4 SELL';
                }
            }
        }

        window.addEventListener('load', () => { selectToken('rain'); });
    </script>
</body>
</html>
